# see https://perlhacks.com/2024/01/github-actions-for-perl-development/

---
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    uses: dod38fr/github_workflows/.github/workflows/cpan-dzil-test.yml@dzil
    with:
      os: '["ubuntu-latest"]'
      listdeps_args: '--no-recommends --no-suggests'
      deplist: >-
        Carp::Assert::More
        File::HomeDir
        Hash::Merge
        List::MoreUtils
        List::Util
        Log::Log4perl
        Mouse
        Mouse::Role
        Mouse::Util
        Mouse::Util::TypeConstraints
        MouseX::NativeTraits
        MouseX::StrictConstructor
        Parse::RecDescent
        Path::Tiny
        Pod::POM
        Regexp::Common
